name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (non-Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Riyadh
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run tests
        run: |
          bazel test //apps/server:test \
            //apps/pos:test \
            //packages/shared:test \
            //packages/db:test \
            //packages/client-ts:test \
            //packages/client-kt:test \
            --test_output=errors

  android:
    name: Android (APK + Unit Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-android-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-android-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('apps/android/**/*.gradle.kts', 'apps/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build & test Android
        run: |
          bazel test //apps/android:unit_tests \
            --action_env=ANDROID_HOME=$ANDROID_HOME \
            --action_env=JAVA_HOME=$JAVA_HOME \
            --test_output=errors

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format

      - name: Type check
        run: pnpm typecheck
