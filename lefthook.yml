pre-commit:
  commands:
    ensure-node24:
      run: pnpm ensure-node24
    format:
      glob: '*.{js,ts,tsx,jsx,json,yaml,yml,css,html}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

pre-push:
  piped: true
  commands:
    ensure-node24:
      run: pnpm ensure-node24
    format:
      run: pnpm format
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm --recursive test
